// -----------------------------------------------------------------------------
// Jacoco test coverage reporting configuration.  When the 'test' task
// completes this will produce a coverage report in both XML and HTML form
// under build/reports/jacoco.  The minimum line coverage is not enforced in
// the build but can be inspected as part of CI checks.
apply plugin: 'jacoco'

jacocoTestReport {
    reports {
        xml.required  = true
        html.required = true
    }
}

