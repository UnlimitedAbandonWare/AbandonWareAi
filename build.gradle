/* ───────────── 플러그인 ───────────── */
plugins {
    id 'java'
    id 'application'
    id 'org.springframework.boot'        version '3.4.0'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'io.freefair.lombok'              version '8.6'

}

// -----------------------------------------------------------------------------
// LangChain4j version alignment and purity enforcement
//
// To avoid accidental mixing of incompatible 0.x artifacts, enforce that
// every dependency originating from the 'dev.langchain4j' group resolves to
// version 1.0.1.  Use the BOM for alignment and a resolution strategy for
// additional safety.  A dedicated purity task scans the resolved classpaths
// and produces a verification report under build/verification when any
// conflicting versions are detected.  The standard 'check' task depends on
// this verification to halt the build early if violations are found.

// Force all dev.langchain4j modules to resolve to 1.0.1 regardless of
// transitive version declarations.
// ✅ core/open-ai만 1.0.1로 고정
configurations.all {
    resolutionStrategy.eachDependency { d ->
        if (d.requested.group == 'dev.langchain4j' &&
                ['langchain4j-core','langchain4j-open-ai'].contains(d.requested.name)) {
            d.useVersion('1.0.1')
        }
    }
}

group   = 'com.example.lms'
version = '0.0.1-SNAPSHOT'

java {
    toolchain { languageVersion = JavaLanguageVersion.of(17) }
}

/* ─── application 플러그인 ─── */
application {
    mainClass       = 'com.example.lms.LmsApplication'
    applicationName = 'demo-1'
}

/* ───────────── 저장소 ───────────── */
repositories { mavenCentral() }

// Exclude legacy or backup Java source files (e.g. *_old.java, *_copy.java) from compilation.
sourceSets {
    main {
        java {
            // Prevent duplicate public class definitions by excluding old or copied versions
            exclude '**/*_old.java', '**/*_copy.java'
            // Exclude original versions of classes that have been patched in the 'patch' subpackages.
            exclude 'com/example/lms/service/ChatService.java'
            exclude 'com/example/lms/service/NaverSearchService.java'
            exclude 'com/example/lms/service/rag/HybridRetriever.java'
            exclude 'com/example/lms/service/rag/SelfAskWebSearchRetriever.java'
            exclude 'com/example/lms/service/rag/handler/EntityDisambiguationHandler.java'
        }
    }
}


// ▼▼▼▼▼ 바로 여기에 추가하시면 됩니다 ▼▼▼▼▼

// -----------------------------------------------------------------------------
// Offline Replay Evaluation Task
//
// This task runs an offline evaluation of retrieval performance against a set
// of replay logs.  To enable the task supply a property `replayLog` on the
// Gradle command line (e.g. -PreplayLog=/path/to/log.jsonl) or set the
// environment variable REPLAY_LOG.  Minimum acceptable NDCG and MRR
// thresholds can be configured via -Preplay.ndcgMin and -Preplay.mrrMin (or
// REPLAY_NDCG_MIN and REPLAY_MRR_MIN).  If the computed metrics fall below
// the thresholds the runner will exit with a non‑zero code, causing the
// build to fail.  When no replay log is specified the task is skipped.
tasks.register("offlineReplayCheck", JavaExec) {
    group = "verification"
    description = "Runs offline replay evaluation on provided logs"
    mainClass = "com.example.lms.replay.OfflineReplayRunner"
    classpath = sourceSets.main.runtimeClasspath
    // Determine the log file from Gradle property or environment
    def logPath = project.findProperty("replayLog") ?: System.getenv("REPLAY_LOG")
    // Determine minimum thresholds from properties/environment
    def ndcgMin = project.findProperty("replay.ndcgMin") ?: System.getenv("REPLAY_NDCG_MIN")
    def mrrMin = project.findProperty("replay.mrrMin") ?: System.getenv("REPLAY_MRR_MIN")
    if (logPath) {
        args logPath
        if (ndcgMin) {
            systemProperty "replay.ndcgMin", ndcgMin
        }
        if (mrrMin) {
            systemProperty "replay.mrrMin", mrrMin
        }
    } else {
        // Skip the task entirely when no log is provided
        enabled = false
        doFirst {
            println "offlineReplayCheck: no replay log specified; skipping offline evaluation"
        }
    }
}

// Hook offline replay check into the verification lifecycle.  The check
// task depends on offlineReplayCheck so that CI pipelines can enforce
// regression guards without further configuration.  When the task is
// disabled (due to missing replay log) it has no effect on build status.
tasks.named("check") {
    dependsOn "offlineReplayCheck"

}


// -----------------------------------------------------------------------------
// LangChain4j version purity enforcement.  This task enumerates all
// dev.langchain4j dependencies on the compile classpath and verifies that
// every module resolves strictly to version 1.0.1.  If any artifact with a
// different version is detected, the build fails and a report is emitted
// under build/reports/langchain4j-conflicts.txt.  The "classes" task
// depends on this check to prevent downstream compilation when the classpath
// contains mixed versions of LangChain4j.
tasks.register("checkLangchain4jVersionPurity") {
    doLast {
        // Generate a report file capturing any LangChain4j artifacts that are not version 1.0.1
        def reportFile = file("${buildDir}/reports/langchain4j-conflicts.txt")
        reportFile.parentFile.mkdirs()
        def bad = []
        def scan = { conf ->
            try {
                conf.resolvedConfiguration.resolvedArtifacts.each { art ->
                    if (art.moduleVersion.id.group == 'dev.langchain4j' && !art.moduleVersion.id.version.startsWith('1.0.1')) {
                        bad << "${art.moduleVersion.id.group}:${art.name}:${art.moduleVersion.id.version}"
                    }
                }
            } catch (ignore) {
                // some configurations may not be resolvable; ignore
            }
        }
        [configurations.compileClasspath, configurations.runtimeClasspath].each(scan)
        if (!bad.isEmpty()) {
            reportFile.text = ([">> Found mixed LangChain4j versions (must be 1.0.1):"] + bad).join('\n') + '\n'
            throw new GradleException("LangChain4j version purity check failed. See ${reportFile}")
        } else {
            reportFile.text = "OK: All dev.langchain4j artifacts are 1.0.1\n"
        }
    }
}

// Ensure that compilation halts when LangChain4j version purity fails.  By
// hooking into the "classes" task we guarantee early feedback during the
// build lifecycle.
// Ensure that the build will fail during the verification phase if mixed
// LangChain4j versions are detected.  Hook into the 'check' task rather
// than 'classes' so that test and verification tasks are gated by the purity check.
tasks.named("check") {
    dependsOn("checkLangchain4jVersionPurity")
}


/* ───────────── BOM & 공통 버전 ───────────── */
ext {
    springCloudVersion = '2024.0.1'
    luceneVersion      = '9.10.0'     // Lucene 공통 버전
}
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs = ['-parameters']
    options.encoding = 'UTF-8'
    // Ensure the compiler targets Java 17 bytecode for language features such as records.
    options.release = 17
}

// ▼ Javadoc/테스트/실행 시 JVM 기본 인코딩도 강제
tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
}
tasks.withType(Test).configureEach {
    jvmArgs '-Dfile.encoding=UTF-8', '-Dsun.jnu.encoding=UTF-8'
}
tasks.named('bootRun') {
    jvmArgs '-Dfile.encoding=UTF-8', '-Dsun.jnu.encoding=UTF-8'
}

dependencyManagement {
    imports {
        mavenBom "dev.langchain4j:langchain4j-bom:1.0.1"                       // ← langchain4j 전 모듈 1.0.1 고정
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        // gRPC 전 모듈을 1.70.0으로 '강제' 정렬 (pinecone, google-genai 등 트랜지티브 포함)
        mavenBom "io.grpc:grpc-bom:1.70.0"

    }
}

/* ───────────── Boot JAR 배포 ───────────── */
bootJar { enabled = false }

tasks.installDist { dependsOn bootJar }

distributions {
    main {
        contents { from(bootJar) { into 'lib' } }
    }
}



