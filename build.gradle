/*
 * -----------------------------------------------------------------------------
 * Version purity enforcement.
 *
 * Some runtime problems stem from mixing incompatible versions of the
 * LangChain4j library. This task walks the resolved dependencies and aborts
 * the build when any dev.langchain4j artifact with a 0.2.x version is
 * detected. The output intentionally prints only the offending coordinate and
 * its jar file location to assist with debugging, without proposing any
 * corrective action.
 */
tasks.register('versionPurityCheck') {
    doLast {
        def conflicts = []
        configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts.each { art ->
            if (art.moduleVersion.id.group == 'dev.langchain4j') {
                def v = art.moduleVersion.id.version
                if (v != null && v.startsWith('0.2.')) {
                    conflicts << "${art.moduleVersion.id.group}:${art.name}:${v} -> ${art.file}"
                }
            }
        }
        if (!conflicts.isEmpty()) {
            // Emit a report rather than failing the build.  Write the list of
            // offending coordinates and their jar locations to a report file
            // under build/reports and log a warning for visibility.
            def reportDir = file("${buildDir}/reports")
            if (!reportDir.exists()) reportDir.mkdirs()
            def reportFile = new File(reportDir, 'langchain4j-conflicts.txt')
            reportFile.text = conflicts.join(System.lineSeparator())
            // Also echo the conflicts to the console for convenience
            conflicts.each { println it }
            logger.warn('LangChain4j version conflict detected. See {} for details.', reportFile.absolutePath)
        }
    }
}

// Fail the standard 'check' task if version purity fails.
// Fail-hard gating: attach the strict version purity check to the 'check' task.
// When mixed LangChain4j versions are detected the build will terminate early
// with an exception and emit the relevant reports.
tasks.named('check') { dependsOn 'checkLangchain4jVersionPurity' }


