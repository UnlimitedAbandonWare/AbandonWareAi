# MERGE_HOOK:PROJ_AGENT::FIM15
spring.config.import: "optional:application-secrets.yml, optional:application-proj-override.yml, ${spring.config.import:}"
llm:
  provider: local
  base-url: http://localhost:11434/v1
  chat-model: "gemma3:27b"
  api-key: dummy
  # MERGED_DUP llm.chat-model :: chat-model: "gemma3:27b"

  # MERGED_DUP llm.api-key :: api-key: dummy

  # MERGED_DUP llm.base-url :: base-url: http://localhost:11434/v1   # 3090-only endpoint
  # MERGED_DUP llm.provider :: provider: local

fallback:
  enabled: false
zsys:
  onnx:
    enabled: true
    device-id: 1
    max-concurrency: 2
gate:
  citation:
    enabled: true
    min: 3
  finalSigmoid:
    enabled: true
    k: 12.0
    x0: 0.0
    threshold: 0.92
  contextDiversity:
    min: 0.35
probe:
  search:
    enabled: true
retrieval:
  vector:
    enabled: true
onnx:
  enabled: true
  device: 1
idle_train:
  schedule: 0 30 0,3,5 * * *
  soak_batch: 20
  update_on_pass: true
llmrouter:
  models:
    primary:
      base-url: "http://localhost:11434/v1"
      weight: 1.0
    secondary:
      base-url: "http://localhost:11434/v1"
      weight: 0.0
  cooldown-ms: 900000

selfask:
  enabled: false

# === merge130: GPU orchestration & idle-learn toggles ===
spring:
  profiles:
    group:
      gpu-3090-3060:   [base]          # 현재: 3090 ×1 + 3060 ×1
      gpu-3090-3060x2: [base]          # FUTURE: 3090 ×1 + 3060 ×2
      # gpu-3060x2: [base]          # legacy/optional; not default
