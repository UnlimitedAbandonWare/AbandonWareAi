# ===========# Web Search Providers Configuration
# ============================================
# ⚠️ 실제 API Key 값은 application-secrets.yml에 정의됩니다.
gpt-search:
  serpapi:
    enabled: true
    base-url: "https://serpapi.com/search.json"
    timeout-ms: 5000
  brave:
    enabled: true
    base-url: "https://api.search.brave.com/res/v1/web/search"
    timeout-ms: 3000
