# MERGE_HOOK:PROJ_AGENT::FIM15
spring.config.import: "optional:application-proj-override.yml, ${spring.config.import:}"
retrieval:
  vector:
    enabled: true
naver:
  hedge:
    enabled: true
    delay-ms: 120
  search:
    timeout-ms: 2500
    web-top-k: 10
    cache:
      enabled: true
      ttl-seconds: 3600
upstash:
  cache:
    ttl-seconds: 3600
onnx:
  enabled: true
zsys:
  onnx:
    max-concurrency: 2
probe:
  search:
    enabled: true
gate:
  citation:
    enabled: true
    min: 3
  finalSigmoid:
    enabled: true
    k: 12.0
    x0: 0.0
plugin:
  image:
    enabled: false

routing:
  tokens:
    light_max: 1600
    mistral_max: 2400
  citation:
    force_heavy: true
  code:
    light_max: 1200
llm:
  provider: local
  base-url: http://localhost:11434/v1
  chat-model: "gemma3:27b"
  api-key: dummy
  # MERGED_DUP llm.base-url :: base-url: http://localhost:11434/v1   # 3090-only endpoint
  # MERGED_DUP llm.provider :: provider: local

fallback:
  enabled: false
selfask:
  enabled: false

train_idle:
  enabled: true

autolearn:
  enabled: true
spring:
  config:
    import: "optional:classpath:application-llm.yaml"
local-llm:
  autostart: false
  health-check-url: "http://localhost:8000/health"
  health-check-timeout: 30s
  start-command: "docker-compose -f vllm-compose.yml up -d"
  enabled: true
  base-url: http://localhost:11434/v1

